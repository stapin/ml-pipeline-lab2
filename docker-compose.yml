version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-free:slim
    container_name: oracle_db
    environment:
      - ORACLE_PASSWORD=${DB_PSW}
      - APP_USER=${DB_USR}
      - APP_USER_PASSWORD=${DB_PSW}
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
  amazon-rating-prediction:
    build: .
    container_name: rating-prediction
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - DB_USER=${DB_USR}
      - DB_PASSWORD=${DB_PSW}
      - DB_HOST=oracle-db
      - DB_PORT=1521
      - DB_SERVICE=FREEPDB1 # Дефолтный сервис в образе gvenzl
    depends_on:
      oracle-db:
        condition: service_healthy